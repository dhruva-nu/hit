name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe what you'd like to see and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this affect?
      multiple: true
      options:
        - TUI
        - CLI (headless subcommands)
        - MCP server
        - OpenAPI / schema parsing
        - FastAPI adapter
        - Other / not sure

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or anything else that helps.
